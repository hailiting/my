name: Test Legacy Portfolio API

on:
  push:
    branches: [master, main]
    paths:
      - 'legacy/**'
      - 'api/**'
      - 'lib/**'
      - 'vercel.json'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: API smoke test (no DeepSeek key in CI)
        run: python3 scripts/test_local.py || true
        env:
          DEEPSEEK_API_KEY: ''
